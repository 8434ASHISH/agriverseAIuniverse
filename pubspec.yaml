name: agriverse_flutter
description: AgriVerse AI - Intelligent Farming Assistant
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  http: ^1.2.2
  image_picker: ^1.0.7
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
